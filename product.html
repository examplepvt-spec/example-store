<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title>
</head><body><div id="product"></div><script type="module">

import { db } from "./admin/firebase.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

const productRef = doc(db,"products",id);

const productSnap = await getDoc(productRef);

if(productSnap.exists()){

const product = productSnap.data();

document.getElementById("product").innerHTML = `

<h1>${product.name}</h1>

<img src="${product.image}" width="300">

<br><br>

<img src="${product.image2 || ''}" width="300">

<br><br>

<img src="${product.image3 || ''}" width="300">

<p style="text-decoration:line-through;color:gray;">
₹${product.price}
</p>

<h2>
₹${product.offerPrice || product.price}
</h2>

<p style="color:orange;">
${product.offerPrice ?
Math.round(
((product.price - product.offerPrice) /
product.price) * 100
) + "% OFF" : ""}
</p>

<p>Size: ${product.size}</p>

<p>Barcode: ${product.barcode || "N/A"}</p>

<p>Stock: ${product.stock || 0}</p>

<p>XS: ${product.xsStock || 0}</p>
<p>S: ${product.sStock || 0}</p>
<p>M: ${product.mStock || 0}</p>
<p>L: ${product.lStock || 0}</p>
<p>XL: ${product.xlStock || 0}</p>
<p>XXL: ${product.xxlStock || 0}</p>
<p>Category: ${product.category}</p>

<a href="${product.video || '#'}" target="_blank">
Watch Video
</a>

<br><br>

<a href="https://wa.me/91YOURNUMBER?text=I want ${product.name}">
Order On WhatsApp
</a>

`;

}

</script>
<a href="https://wa.me/919656003555"
style="
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
text-decoration:none;
z-index:9999;">
💬
</a>
</body>
</html>
