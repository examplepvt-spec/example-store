<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h1{
text-align:center;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#ffd700;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Add Product</h1>

<input type="text" id="name" placeholder="Product Name">

<input type="number" id="price" placeholder="Price">

<input type="text" id="size" placeholder="Size">
<input type="text" id="barcode" placeholder="Barcode">
<input type="number" id="stock" placeholder="Stock Quantity">
<select id="category">
<option>Shirts</option>
<option>Polo T-Shirts</option>
<option>T-Shirts</option>
<option>Jackets</option>
<option>Jeans</option>
<option>Shorts</option>
<option>Shoes</option><option>Women Tops</option>
<option>Women T-Shirts</option>
<option>Women Jackets</option>
<option>Women Jeans</option>
<option>Women Dresses</option><option>Boys</option>
<option>Girls</option>
<option>Kids Jackets</option><option>Accessories</option>
<option>Footwear</option>
<option>Sale</option>
</select>

<input type="text" id="image" placeholder="Image URL">
<input type="text" id="image2" placeholder="Image 2 URL">

<input type="text" id="image3" placeholder="Image 3 URL">

<input type="text" id="video" placeholder="Video URL">
<button id="saveBtn">SAVE PRODUCT</button>

<script type="module">

import { db } from './firebase.js';

import {
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
alert("JavaScript Loaded");
document.getElementById("saveBtn").addEventListener("click", async () => {
alert("Button Working");
const name = document.getElementById("name").value;
const price = document.getElementById("price").value;
const size = document.getElementById("size").value;
const barcode = document.getElementById("barcode").value;
const stock = document.getElementById("stock").value;
const category = document.getElementById("category").value;
const image = document.getElementById("image").value;
const image2 = document.getElementById("image2").value;
const image3 = document.getElementById("image3").value;
const video = document.getElementById("video").value;
try {

await addDoc(collection(db, "products"), {
name,
price,
size,
stock,
barcode,
category,
image,
image2,
image3,
video
});
alert("Product Saved Successfully");

document.getElementById("name").value="";
document.getElementById("price").value="";
document.getElementById("size").value="";
document.getElementById("image").value="";
document.getElementById("barcode").value="";
document.getElementById("stock").value="";
}
catch(error){
alert(error.message);
}

});

</script>

</body>
</html>
