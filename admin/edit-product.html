<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Product</title><style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:#ffd700;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
</style></head>
<body><h1>Edit Product</h1><input type="text" id="name" placeholder="Product Name">
<input type="number" id="price" placeholder="Price">
<input type="number" id="offerPrice" placeholder="Offer Price">

<input type="number" id="xsStock" placeholder="XS Stock">
<input type="number" id="sStock" placeholder="S Stock">
<input type="number" id="mStock" placeholder="M Stock">
<input type="number" id="lStock" placeholder="L Stock">
<input type="number" id="xlStock" placeholder="XL Stock">
<input type="number" id="xxlStock" placeholder="XXL Stock">
<input type="text" id="size" placeholder="Size">

<select id="category">
<option value="Shirts">Shirts</option>
<option value="T-Shirts">T-Shirts</option>
<option value="Polo T-Shirts">Polo T-Shirts</option>
<option value="Jackets">Jackets</option>
<option value="Jeans">Jeans</option>
<option value="Footwear">Footwear</option>
<option value="Accessories">Accessories</option>
<option value="Sale">Sale</option>
<option value="Women jackets">Women jackets</option>
<option value="Women jeans">Women jeans</option>
<option value="Women tshirt">Women tshirt</option>
<option value="Kids jackets">Kids Jackets</option>
</select>

<input type="text" id="barcode" placeholder="Barcode">

<input type="number" id="stock" placeholder="Stock">
<input type="text" id="image" placeholder="Image URL"><button id="saveBtn">Update Product</button>
<input type="text" id="image2" placeholder="Image 2 URL">
<input type="text" id="image3" placeholder="Image 3 URL">
<input type="text" id="video" placeholder="Video URL">
<script type="module">

import { db } from "./firebase.js";

import {
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const productRef = doc(db,"products",id);
const productSnap = await getDoc(productRef);

if(productSnap.exists()){

const product = productSnap.data();

document.getElementById("name").value = product.name || "";
document.getElementById("price").value = product.price || "";
document.getElementById("size").value = product.size || "";
document.getElementById("category").value = product.category || "";
document.getElementById("image").value = product.image || "";
document.getElementById("barcode").value = product.barcode || "";
document.getElementById("stock").value = product.stock || "";
document.getElementById("image2").value = product.image2 || "";
document.getElementById("image3").value = product.image3 || "";
document.getElementById("video").value = product.video || "";
}

document.getElementById("saveBtn").addEventListener("click", async()=>{

await updateDoc(productRef,{
name:document.getElementById("name").value,
price:document.getElementById("price").value,
size:document.getElementById("size").value,
barcode:document.getElementById("barcode").value,
stock:document.getElementById("stock").value,
category:document.getElementById("category").value,
image:document.getElementById("image").value,
image2:document.getElementById("image2").value,
image3:document.getElementById("image3").value,
video:document.getElementById("video").value
});

alert("Product Updated");

});

</script></body>
</html>
