<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products List</title>

<style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

.card{
border:1px solid #444;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

img{
width:120px;
border-radius:8px;
}

button{
background:red;
color:white;
border:none;
padding:10px;
margin-top:10px;
border-radius:5px;
cursor:pointer;
}

a{
color:#ffd700;
text-decoration:none;
}

#search{
width:100%;
padding:12px;
margin:20px 0;
border-radius:8px;
border:none;
}
</style>
</head>

<body>

<a href="dashboard.html">← Dashboard</a>

<h1>Products List</h1>

<input
type="text"
id="search"
placeholder="Search Name or Barcode">

<div id="products"></div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs,
doc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const productsDiv = document.getElementById("products");
const searchInput = document.getElementById("search");

const querySnapshot = await getDocs(collection(db,"products"));

function displayProducts(searchText=""){

productsDiv.innerHTML = "";

querySnapshot.forEach((productDoc)=>{

const product = productDoc.data();

const name = (product.name || "").toLowerCase();
const barcode = (product.barcode || "").toString().toLowerCase();
const search = searchText.toLowerCase();

if(
search &&
!name.includes(search) &&
!barcode.includes(search)
){
return;
}

productsDiv.innerHTML += `
<div class="card">

<img src="${product.image}" alt="">

<h3>${product.name}</h3>

<p>₹${product.price}</p>

<p>${product.category}</p>

<p>Barcode: ${product.barcode || ""}</p>

<a href="edit-product.html?id=${productDoc.id}">
<button style="background:green;">
Edit
</button>
</a>

<button onclick="deleteProduct('${productDoc.id}')">
Delete
</button>

</div>
`;

});

}

displayProducts();

searchInput.addEventListener("input", () => {
displayProducts(searchInput.value);
});

window.deleteProduct = async(id)=>{

await deleteDoc(doc(db,"products",id));

alert("Product Deleted");

location.reload();

};

</script>

</body>
</html>
