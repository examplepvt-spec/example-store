<!DOCTYPE html>
<html>

<body>

<h1>All Products</h1>

<input
type="text"
id="search"
placeholder="Search Products..."
style="width:100%;padding:12px;margin:20px 0;border-radius:8px;">

<div id="products"></div>

<script type="module">

import { db } from "./admin/firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const productsDiv = document.getElementById("products");
const searchInput = document.getElementById("search");

const querySnapshot = await getDocs(collection(db,"products"));

const allProducts = [];

querySnapshot.forEach((doc) => {
allProducts.push({
id: doc.id,
...doc.data()
});
});

const params = new URLSearchParams(window.location.search);
const selectedCategory = params.get("category");

function displayProducts(searchText = "") {

productsDiv.innerHTML = "";

allProducts.forEach((product) => {

if(selectedCategory && product.category !== selectedCategory){
return;
}

const name = (product.name || "").toLowerCase();
const search = searchText.toLowerCase();

if(search && !name.includes(search)){
return;
}

productsDiv.innerHTML += `

<a href="product.html?id=${product.id}"
style="text-decoration:none;color:black;display:block;">

<div style="border:1px solid #ddd;padding:15px;margin:10px;">

<img src="${product.image}"
style="width:200px;height:auto;">

<h3>${product.name}</h3>

<p>₹${product.price}</p>

<p>${product.size}</p>

<p>${product.category}</p>

</div>

</a>

`;

});

}

displayProducts();

searchInput.addEventListener("input", () => {
displayProducts(searchInput.value);
});

</script>

</body>
</html>
