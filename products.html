<!DOCTYPE html><html>  <body><h1>All Products</h1><div id="products"></div><script type="module">  import { db } from "./admin/firebase.js";
import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const productsDiv = document.getElementById("products");

const querySnapshot = await getDocs(collection(db,"products"));
const params = new URLSearchParams(window.location.search);
const selectedCategory = params.get("category");
querySnapshot.forEach((doc) => {

const product = doc.data();

if(selectedCategory && product.category !== selectedCategory){
return;
}
productsDiv.innerHTML += `
<a href="product.html?id=${doc.id}" style="text-decoration:none;color:black;display:block;">

<div style="border:1px solid #ddd;padding:15px;margin:10px;">  <img src="${product.image}" style="width:200px;height:auto;">  <h3>${product.name}</h3>  <p>₹${product.price}</p>  <p>${product.size}</p>  <p>${product.category}</p>  </div>  </a>  
`;  });

</script></body>

</html>
